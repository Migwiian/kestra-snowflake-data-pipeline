version: "3.8"

volumes:
  kestra_postgres_data:
    driver: local
  kestra_data:
    driver: local

services:
  # DATABASE: Metadata storage for Kestra flows, states, and executions
  kestra_postgres:
    image: postgres:15
    volumes:
      - kestra_postgres_data:/var/lib/postgresql
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ORCHESTRATOR: The core Kestra engine and Web UI
  kestra:
    build: .
    image: kestra/kestra:v1.1-kaggle
    pull_policy: always
    user: "root"
    command: server standalone
    volumes:
      - kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock # Allows Kestra to launch task containers
      - /tmp/kestra-wd:/tmp/kestra-wd
      - ./flows:/app/flows
    env_file:
      - .env
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra_postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
            driverClassName: org.postgresql.Driver
            username: ${POSTGRES_USER:?POSTGRES_USER is required}
            password: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
        kestra:
          server:
            basicAuth:
              username: "${KESTRA_BASIC_AUTH_USERNAME:?KESTRA_BASIC_AUTH_USERNAME is required}"
              password: "${KESTRA_BASIC_AUTH_PASSWORD:?KESTRA_BASIC_AUTH_PASSWORD is required}"
          repository:
            type: local
            local:
              basePath: "/app/flows"
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/

    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      kestra_postgres:
        condition: service_started
